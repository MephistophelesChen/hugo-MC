<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 800" id="landscape-scroll">
  <!-- 背景层 - 水墨渐变 -->
  <rect width="100%" height="100%" fill="url(#waterInkGradient)" />


  <!-- 山峰层 - 文人山水 -->
  <g class="mountain-layer" data-depth="0.8">
    <!-- 主山脉 - 使用墨分五色原理 -->
    <path d="M 100 600 L 300 200 L 500 500 L 700 300 L 900 600 L 1100 100 L 1100 600 Z"
          class="mountain"
          style="animation-delay: 0.2s;" />

    <!-- 次要山峰 - 层次感 -->
    <path d="M 50 600 L 250 300 L 450 550 L 650 250 L 850 550 L 1050 150 L 1150 600 Z"
          class="mountain"
          style="animation-delay: 0.4s;" />

    <!-- 远山 - 清墨效果 -->
    <path d="M 0 600 L 200 400 L 400 580 L 600 350 L 800 580 L 1000 250 L 1200 600 Z"
          class="mountain"
          style="opacity: 0.6; animation-delay: 0.6s;" />
  </g>

  <!-- 云彩层 - 动态飘动 -->
  <g class="cloud-layer" data-depth="0.6">
    <!-- 主云彩 - 包豪斯几何圆形 -->
    <circle cx="300" cy="200" r="80" class="cloud" style="animation-delay: 0.3s;" />
    <circle cx="400" cy="250" r="60" class="cloud" style="animation-delay: 0.5s;" />
    <circle cx="500" cy="180" r="70" class="cloud" style="animation-delay: 0.7s;" />

    <!-- 次云彩 - 书法线条感 -->
    <path d="M 600 220 Q 650 180 700 240 Q 750 300 800 220"
          class="stroke"
          style="stroke:var(--color-rubai); animation-delay: 0.8s;" />

    <path d="M 850 200 Q 900 160 950 220 Q 1000 280 1050 200"
          class="stroke"
          style="stroke:var(--color-rubai); animation-delay: 1.0s;" />
  </g>

  <!-- 墨点效果 - 康定斯基抽象表现主义 -->
  <g class="ink-dot-layer" data-depth="1.0">
    <!-- 主墨点 - 朱砂色 -->
    <circle cx="400" cy="400" r="30" class="ink-dot" style="fill:var(--color-shihong); animation-delay: 0.5s;" />
    <circle cx="600" cy="450" r="25" class="ink-dot" style="fill:var(--color-shihong); animation-delay: 0.7s;" />
    <circle cx="800" cy="380" r="35" class="ink-dot" style="fill:var(--color-shihong); animation-delay: 0.9s;" />

    <!-- 辅助墨点 - 石青色 -->
    <circle cx="500" cy="350" r="20" class="ink-dot" style="fill:var(--color-ganglan); animation-delay: 0.6s;" />
    <circle cx="700" cy="420" r="22" class="ink-dot" style="fill:var(--color-ganglan); animation-delay: 0.8s;" />
    <circle cx="900" cy="360" r="28" class="ink-dot" style="fill:var(--color-ganglan); animation-delay: 1.0s;" />
  </g>

  <!-- 康定斯基几何元素层 -->
  <g class="geometric-layer" data-depth="1.1">
    <!-- 圆形 - 和谐与完整 -->
    <circle cx="300" cy="500" r="50" class="geometric-shape circle" style="animation-delay: 0.4s;" />
    <circle cx="500" cy="550" r="40" class="geometric-shape circle" style="animation-delay: 0.6s;" />
    <circle cx="700" cy="480" r="60" class="geometric-shape circle" style="animation-delay: 0.8s;" />

    <!-- 三角形 - 张力与动感 -->
    <path d="M 800 600 L 850 500 L 750 500 Z" class="geometric-shape triangle" style="animation-delay: 0.5s;" />
    <path d="M 900 580 L 950 480 L 850 480 Z" class="geometric-shape triangle" style="animation-delay: 0.7s;" />
    <path d="M 1000 620 L 1050 520 L 950 520 Z" class="geometric-shape triangle" style="animation-delay: 0.9s;" />

    <!-- 直线 - 秩序与理性 -->
    <line x1="200" y1="200" x2="1000" y2="200" class="geometric-shape line" style="animation-delay: 0.3s;" />
    <line x1="200" y1="300" x2="1000" y2="300" class="geometric-shape line" style="animation-delay: 0.4s;" />
    <line x1="200" y1="400" x2="1000" y2="400" class="geometric-shape line" style="animation-delay: 0.5s;" />
  </g>

  <!-- 书法笔画层 - 骨法用笔 -->
  <g class="calligraphy-layer" data-depth="1.2">
    <!-- 主笔画 - 仿兰亭序 -->
    <path d="M 200 500 C 300 450 400 550 500 500 C 600 450 700 550 800 500"
          class="stroke"
          style="stroke:var(--color-ganglan); stroke-width:3; animation-delay: 0.2s;" />

    <path d="M 250 550 C 350 500 450 600 550 550 C 650 500 750 600 850 550"
          class="stroke"
          style="stroke:var(--color-ganglan); stroke-width:3; animation-delay: 0.3s;" />

    <!-- 辅助笔画 - 行书韵律 -->
    <path d="M 300 450 Q 400 400 500 450 Q 600 500 700 450"
          class="stroke"
          style="stroke:var(--color-dianqing); animation-delay: 0.4s;" />

    <path d="M 350 500 Q 450 450 550 500 Q 650 550 750 500"
          class="stroke"
          style="stroke:var(--color-dianqing); animation-delay: 0.5s;" />
  </g>

  <!-- 水墨渐变层 - 设色层次 -->
  <g class="water-ink-layer" data-depth="0.4">
    <!-- 水墨渐变 - 模拟设色层次 -->
    <path d="M 100 600 C 300 400 500 500 700 400 C 900 300 1100 500 1100 600"
          class="water-ink"
          style="opacity:0.8; animation-delay: 0.1s;" />

    <path d="M 50 600 C 250 350 450 450 650 350 C 850 250 1050 450 1150 600"
          class="water-ink"
          style="opacity:0.6; animation-delay: 0.2s;" />

    <path d="M 0 600 C 200 300 400 400 600 300 C 800 200 1000 400 1200 600"
          class="water-ink"
          style="opacity:0.4; animation-delay: 0.3s;" />
  </g>
</svg>