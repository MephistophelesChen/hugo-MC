<script>
(function(){
    function currentTheme(){
        const html=document.documentElement;
        let t=html.dataset.theme;
        if(!t) t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
        return t==='dark'?'dark':'light';
    }

    function insertGiscus(){
        const theme=currentTheme();
        document.write(`
<script src="https://giscus.app/client.js"
        data-repo="DejavuMoe/hugo-start"
        data-repo-id="R_kgDOJTFaRg"
        data-category="Announcements"
        data-category-id="DIC_kwDOJTFaRs4CVkLY"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="${theme}"
        data-lang="zh-CN"
        data-loading="lazy"
        crossorigin="anonymous"
        async><\/script>
        `);
    }

    function notifyGiscus(){
        const iframe=document.querySelector('iframe.giscus-frame');
        if(iframe&&iframe.contentWindow){
            iframe.contentWindow.postMessage(
                {giscus:{setConfig:{theme:currentTheme()}}},
                'https://giscus.app'
            );
        }
    }

    insertGiscus();

    document.addEventListener('click',e=>{
        if(e.target&&e.target.id==='theme-toggle')
            setTimeout(notifyGiscus,50);
    });

    new MutationObserver(muts=>{
        for(const m of muts) if(m.attributeName==='data-theme') notifyGiscus();
    }).observe(document.documentElement,{attributes:true});
})();
</script>
